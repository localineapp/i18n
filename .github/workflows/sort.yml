name: Sort Locale Files

on:
  push:
    branches:
      - "**"
  pull_request:
    types:
      - opened
      - synchronize
      - ready_for_review

jobs:
  sort-locales:
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.17.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run locale sorter
        run: npx ts-node scripts/sort-files.ts

      - name: Commit changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "chore: auto-sort locale files"
            git push
          fi